<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advocaat van de Aarde - Legal Mapping Platform</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <div id="header">
        <h1>Legal Evidence Mapping Tool</h1>
        <p>Real-time integration with environmental datasets</p>
    </div>
    
    <div id="map"></div>
    <div id="info-panel" class="info-panel hidden">
    <div class="panel-header" style="background: #2c3e50; color: white; padding: 10px; display: flex; justify-content: space-between;">
        <h3 id="panel-title" style="margin: 0;">Details</h3>
        <button id="close-panel-btn" style="background: none; border: none; color: white; cursor: pointer; font-size: 20px;">&times;</button>
    </div>
    <div id="panel-content" style="padding: 15px; max-height: 400px; overflow-y: auto;"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <script src="{{ url_for('static', filename='js/map.js') }}"></script>
</body>
</html>
